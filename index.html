<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="CyberLedger - Local Cloud Accounting System">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>CyberLedger</title>
    <link rel="icon" type="image/png" href="/background.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --income: #4cd964;
            --expense: #ff3b30;
            --warn: #ff9500;
            --primary: #007aff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #fff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --bg-overlay: rgba(0, 0, 0, 0.72);
        }

        [data-theme="light"] {
            --glass-bg: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #1a1a2e;
            --text-secondary: rgba(0, 0, 0, 0.5);
            --bg-overlay: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 149, 0, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(255, 149, 0, 0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: url('/background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: var(--text);
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px 16px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--glass-border); }
        .icon-btn:active { transform: scale(0.92); }

        /* Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            animation: fadeInUp 0.6s ease both;
        }

        /* Tab Group */
        .tab-group {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text);
        }

        /* Balance Card */
        .balance-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .balance-label {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 4px 0;
        }

        .balance-amount.income { color: var(--income); }
        .balance-amount.expense { color: var(--expense); }

        .chart-small {
            width: 60px;
            height: 60px;
        }

        .chart-container {
            height: 60px;
            margin: 8px 0;
        }

        /* Budget */
        .budget-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
        }

        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .budget-label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .budget-status {
            font-size: 0.75rem;
            font-family: 'SF Mono', monospace;
        }

        .budget-bar-bg {
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .budget-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease, background 0.5s;
        }

        .budget-warn { animation: pulse 1.5s infinite; }

        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        input, select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
        }
        input::placeholder { color: var(--text-secondary); }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0 18px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: var(--glass-border); }
        .btn:active { transform: scale(0.95); }

        /* Goal Card */
        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .goal-progress-bg {
            height: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            margin: 12px 0;
        }

        .goal-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #00f2ff);
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 12px rgba(0, 122, 255, 0.5);
        }

        .goal-percent {
            background: rgba(0, 122, 255, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
            color: var(--primary);
            border: 1px solid rgba(0, 122, 255, 0.2);
        }

        /* Stats Comparison */
        .compare-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            text-align: center;
        }

        .compare-item h4 {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .compare-item p {
            font-size: 1rem;
            font-weight: 700;
        }

        .trend-up { color: var(--income); }
        .trend-down { color: var(--expense); }

        /* Category Stats */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-secondary);
        }

        .section-arrow {
            transition: transform 0.3s;
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .section-header.open .section-arrow {
            transform: rotate(180deg);
        }

        .section-content {
            margin-top: 12px;
        }

        .section-content.collapsed { display: none; }

        .chart-bar-container {
            height: 160px;
            margin-top: 12px;
        }

        /* Input Card */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 12px 0;
        }

        .key {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }
        .key:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.9);
        }

        .amount-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            text-align: right;
            font-size: 2rem;
            font-weight: 800;
            font-family: 'SF Mono', monospace;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-income, .btn-expense {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-income {
            background: var(--income);
            box-shadow: 0 8px 20px rgba(76, 217, 100, 0.3);
        }

        .btn-expense {
            background: var(--expense);
            box-shadow: 0 8px 20px rgba(255, 59, 48, 0.3);
        }

        .btn-income:active, .btn-expense:active { transform: scale(0.96); }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .recurring-badge {
            background: rgba(255, 149, 0, 0.2);
            color: var(--warn);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: 6px;
            font-weight: 600;
        }

        /* Search */
        .search-bar {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .chip:hover { background: rgba(255, 255, 255, 0.1); }
        .chip.active {
            background: rgba(0, 122, 255, 0.2);
            border-color: rgba(0, 122, 255, 0.4);
            color: var(--primary);
        }

        .record-count {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .clear-filters {
            cursor: pointer;
        }
        .clear-filters:hover { opacity: 0.8; }

        /* Record List */
        .record-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record-list::-webkit-scrollbar { width: 4px; }
        .record-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .date-group {
            font-size: 0.65rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 1px;
            margin: 12px 0 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--glass-border);
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: opacity 0.2s;
            animation: slideDown 0.3s ease both;
        }
        .record-item:active { opacity: 0.6; }

        .record-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .record-icon {
            font-size: 1.2rem;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .record-category {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .record-desc {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .record-amount {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .record-amount.income { color: var(--income); }
        .record-amount.expense { color: var(--expense); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 0.85rem;
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        /* Celebration */
        .celebration {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .celebration.show { display: flex; }

        .celebration-content {
            text-align: center;
            animation: fadeInUp 0.7s ease both;
        }

        .celebration-emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .celebration-title {
            color: #ffd700;
            font-size: 1.5rem;
            margin-bottom: 16px;
        }

        .celebration-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .celebration-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
            padding: 16px 60px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-secondary);
            opacity: 0.5;
            padding: 20px 0;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal.show { display: flex; }

        .modal-content {
            background: #2a2a3e;
            border-radius: 20px;
            padding: 24px;
            max-width: 320px;
            width: 100%;
            animation: fadeInUp 0.3s ease;
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .modal-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .modal-btn-confirm {
            background: var(--expense);
            color: #fff;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Celebration Overlay -->
    <div id="celebration" class="celebration">
        <div class="celebration-content">
            <div class="celebration-emoji">🎉</div>
            <h2 class="celebration-title" data-i18n="goal_achieved">Goal Achieved!</h2>
            <p id="celebration-text" class="celebration-text"></p>
            <button class="celebration-btn" onclick="clearGoal()" data-i18n="claim_reward">Claim Reward</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modal-title"></h3>
            <p class="modal-text" id="modal-text"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()" data-i18n="cancel">Cancel</button>
                <button class="modal-btn modal-btn-confirm" id="modal-confirm" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <!-- Main App -->
    <div class="container" id="app" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <span class="logo">📒</span>
                <span class="tab-group" style="width: 140px;">
                    <button class="tab-btn active" onclick="switchRange('week', this)" data-i18n="week">Week</button>
                    <button class="tab-btn" onclick="switchRange('month', this)" data-i18n="month">Month</button>
                </span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="exportExcel()" title="Export Excel">📊</button>
                <button class="icon-btn" onclick="exportBackup()" title="Backup">💾</button>
                <button class="icon-btn" onclick="document.getElementById('import-file').click()" title="Import">📂</button>
                <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(event)">
                <button class="icon-btn" onclick="toggleTheme()" title="Theme">🌙</button>
                <button class="icon-btn" onclick="switchLanguage()" title="Language">🌐</button>
            </div>
        </div>

        <!-- Balance Overview -->
        <div class="card">
            <div class="balance-header">
                <div>
                    <div class="balance-label" data-i18n="total_balance">TOTAL BALANCE</div>
                    <div id="balance-amount" class="balance-amount">¥ 0.00</div>
                </div>
                <canvas id="pie-chart" class="chart-small"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="line-chart"></canvas>
            </div>

            <!-- Budget -->
            <div class="budget-section">
                <div class="budget-header">
                    <span class="budget-label" data-i18n="monthly_budget">💸 Monthly Budget</span>
                    <span id="budget-status" class="budget-status"></span>
                </div>
                <div class="budget-bar-bg" id="budget-bar-bg">
                    <div id="budget-bar" class="budget-bar"></div>
                </div>
                <div class="input-row">
                    <input type="number" id="budget-input" placeholder="Budget limit" data-i18n-placeholder="budget_placeholder" style="flex:1;">
                    <button class="btn" onclick="setBudget()" data-i18n="set">Set</button>
                </div>
            </div>
        </div>

        <!-- Month Comparison -->
        <div class="card">
            <div class="compare-grid">
                <div class="compare-item">
                    <h4 data-i18n="last_income">Last Month Income</h4>
                    <p id="last-income">-</p>
                </div>
                <div class="compare-item">
                    <h4 data-i18n="last_expense">Last Month Expense</h4>
                    <p id="last-expense">-</p>
                </div>
                <div class="compare-item">
                    <h4 data-i18n="expense_change">Change</h4>
                    <p id="expense-change">-</p>
                </div>
            </div>
        </div>

        <!-- Goal -->
        <div class="card">
            <div class="goal-header">
                <span id="goal-name" class="goal-label" data-i18n="savings_goal">🎯 Savings Goal</span>
                <span id="goal-percent" class="goal-percent">0.0%</span>
            </div>
            <div class="goal-progress-bg">
                <div id="goal-progress" class="goal-progress"></div>
            </div>
            <div class="input-row">
                <input type="text" id="goal-name-input" placeholder="Goal name" data-i18n-placeholder="goal_name_placeholder" style="flex:1.5;">
                <input type="number" id="goal-amount-input" placeholder="Amount" data-i18n-placeholder="amount_placeholder" style="flex:1;">
                <button class="btn" onclick="setGoal()" data-i18n="set">Set</button>
            </div>
        </div>

        <!-- Category Stats -->
        <div class="card">
            <div class="section-header open" onclick="toggleSection(this)">
                <span class="section-title" data-i18n="category_stats">📊 Category Stats</span>
                <span class="section-arrow">▼</span>
            </div>
            <div class="section-content" id="category-stats-content">
                <div class="chart-bar-container">
                    <canvas id="cat-bar-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- Add Record -->
        <div class="card">
            <div style="display:flex; flex-direction:column; gap:12px;">
                <div style="display:flex; gap:10px;">
                    <select id="category" style="flex:0.8;">

        // ============================================
        // State
        // ============================================
        let records = [];
        let inputStr = "";
        let goal = { name: "", amount: 0, achieved: false };
        let budget = { amount: 0 };
        let lineChart, pieChart, catBarChart;
        let currentRange = 'week';
        let activeFilter = null;
        let searchQuery = "";
        let currentLang = 'en';
        let pendingAction = null;

        const CAT_EMOJI = {
            food: '🍔', shopping: '🛍️', transport: '🚗', entertainment: '🎮',
            housing: '🏠', medical: '💊', education: '📚', daily: '☕', income: '💰'
        };

        const CAT_COLORS = {
            food: '#ff6b6b', shopping: '#feca57', transport: '#48dbfb',
            entertainment: '#ff9ff3', housing: '#54a0ff', medical: '#5f27cd',
            education: '#00d2d3', daily: '#b8e994', income: '#4cd964'
        };

        // ============================================
        // Initialize
        // ============================================
        async function init() {
            // Load language preference
            currentLang = localStorage.getItem('cyberledger_lang') || 'en';
            document.documentElement.lang = currentLang;

            // Load theme preference
            const theme = localStorage.getItem('cyberledger_theme') || 'dark';
            document.body.setAttribute('data-theme', theme);

            // Load data
            try {
                const res = await fetch('/api/v1/data');
                const json = await res.json();
                records = json.data || [];
                records.sort((a, b) => new Date(b.date) - new Date(a.date));
            } catch (e) {
                records = [];
            }

            // Load goal and budget from localStorage
            const savedGoal = localStorage.getItem('cyberledger_goal');
            if (savedGoal) goal = JSON.parse(savedGoal);

            const savedBudget = localStorage.getItem('cyberledger_budget');
            if (savedBudget) {
                budget = JSON.parse(savedBudget);
                document.getElementById('budget-input').value = budget.amount || '';
            }

            // Apply translations
            applyTranslations();

            // Render keypad
            renderKeypad();

            // Hide loading, show app
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'flex';

            refresh();
        }

        function applyTranslations() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });

            // Update category names
            const catSelect = document.getElementById('category');
            Object.keys(CAT_EMOJI).forEach(cat => {
                const option = catSelect.querySelector(`option[value="${cat}"]`);
                if (option && cat !== 'income') {
                    option.textContent = `${CAT_EMOJI[cat]} ${t[cat] || cat}`;
                }
            });

            // Update title
            document.title = 'CyberLedger';
        }

        function switchLanguage() {
            const langs = ['en', 'zh', 'ja'];
            const currentIndex = langs.indexOf(currentLang);
            currentLang = langs[(currentIndex + 1) % langs.length];
            localStorage.setItem('cyberledger_lang', currentLang);
            document.documentElement.lang = currentLang;
            applyTranslations();
            renderList();
            refresh();
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('cyberledger_theme', next);
            showToast(translations[currentLang][next === 'dark' ? 'theme_dark' : 'theme_light']);
            refreshCharts();
        }

        // ============================================
        // Section Toggle
        // ============================================
        function toggleSection(el) {
            el.classList.toggle('open');
            el.nextElementSibling.classList.toggle('collapsed');
        }

        // ============================================
        // Range Switch
        // ============================================
        function switchRange(range, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRange = range;
            refresh();
        }

        // ============================================
        // Goal
        // ============================================
        function setGoal() {
            const name = document.getElementById('goal-name-input').value;
            const amt = parseFloat(document.getElementById('goal-amount-input').value);
            if (!name || !amt) return;

            goal = { name, amount: amt, achieved: false };
            localStorage.setItem('cyberledger_goal', JSON.stringify(goal));
            refresh();
            showToast(`${translations[currentLang].goal_set}${name}`);
        }

        function clearGoal() {
            goal = { name: "", amount: 0, achieved: false };
            localStorage.removeItem('cyberledger_goal');
            document.getElementById('celebration').classList.remove('show');
            document.getElementById('goal-name-input').value = "";
            document.getElementById('goal-amount-input').value = "";
            refresh();
        }

        // ============================================
        // Budget
        // ============================================
        function setBudget() {
            const amt = parseFloat(document.getElementById('budget-input').value);
            if (!amt || amt <= 0) {
                budget = { amount: 0 };
                localStorage.removeItem('cyberledger_budget');
                showToast(translations[currentLang].budget_cleared);
            } else {
                budget = { amount: amt };
                localStorage.setItem('cyberledger_budget', JSON.stringify(budget));
                showToast(`${translations[currentLang].budget_set}${amt.toFixed(2)}`);
            }
            refresh();
        }

        // ============================================
        // Records
        // ============================================
        async function saveRecord(type) {
            const amt = parseFloat(inputStr);
            if (!amt) return;

            const cat = document.getElementById('category').value;
            const desc = document.getElementById('description').value || "No note";
            const isRecurring = document.getElementById('recurring').checked;

            records.unshift({
                id: Date.now(),
                cat,
                desc,
                amount: type === 'income' ? amt : -amt,
                date: new Date().toISOString(),
                recurring: isRecurring && type === 'expense'
            });

            await syncData();

            inputStr = "";
            document.getElementById('display-amount').textContent = "¥ 0.00";
            document.getElementById('description').value = "";
            document.getElementById('recurring').checked = false;

            refresh();
            showToast(`${type === 'income' ? translations[currentLang].added_income : translations[currentLang].added_expense}¥${amt.toFixed(2)}`);
        }

        async function deleteRecord(id) {
            records = records.filter(i => i.id !== id);
            await syncData();
            refresh();
        }

        async function syncData() {
            await fetch('/api/v1/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(records)
            });
        }

        // ============================================
        // Filter & Search
        // ============================================
        function renderFilterChips() {
            const cats = [...new Set(records.map(i => i.cat))];
            const chips = document.getElementById('filter-chips');
            const t = translations[currentLang];

            chips.innerHTML = cats.map(c => `
                <span class="chip${activeFilter === c ? ' active' : ''}" onclick="toggleFilter('${c}')">
                    ${CAT_EMOJI[c]} ${t[c] || c}
                </span>
            `).join('');
        }

        function toggleFilter(cat) {
            activeFilter = activeFilter === cat ? null : cat;
            renderFilterChips();
            renderList();
        }

        function clearFilters() {
            activeFilter = null;
            searchQuery = "";
            document.getElementById('search-input').value = "";
            renderFilterChips();
            renderList();
        }

        function getFilteredRecords() {
            let filtered = records;
            if (activeFilter) filtered = filtered.filter(i => i.cat === activeFilter);
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(i =>
                    i.desc.toLowerCase().includes(q) ||
                    (translations[currentLang][i.cat] || i.cat).toLowerCase().includes(q)
                );
            }
            return filtered;
        }

        function getRangeFiltered() {
            const now = new Date();
            const days = currentRange === 'week' ? 7 : 30;
            return records.filter(i => (now - new Date(i.date)) / 86400000 <= days);
        }

        function renderList() {
            const list = document.getElementById('record-list');
            const filtered = getFilteredRecords();
            const t = translations[currentLang];

            document.getElementById('record-count').textContent = `${filtered.length} records`;

            list.innerHTML = "";
            let lastDate = "";

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state">${t.no_records}</div>`;
                return;
            }

            filtered.forEach(item => {
                const itemDate = new Date(item.date).toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : currentLang === 'ja' ? 'ja-JP' : 'en-US',
                    { month: 'short', day: 'numeric', weekday: 'short' });

                if (itemDate !== lastDate) {
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'date-group';
                    groupDiv.textContent = itemDate;
                    list.appendChild(groupDiv);
                    lastDate = itemDate;
                }

                const div = document.createElement('div');
                div.className = 'record-item';
                div.onclick = () => {
                    pendingAction = { type: 'delete', id: item.id };
                    document.getElementById('modal-title').textContent = translations[currentLang].confirm_clear;
                    document.getElementById('modal-text').textContent = translations[currentLang].confirm_clear_text;
                    document.getElementById('confirm-modal').classList.add('show');
                };

                const recurringBadge = item.recurring ? `<span class="recurring-badge">定期</span>` : '';
                div.innerHTML = `
                    <div class="record-left">
                        <div class="record-icon">${CAT_EMOJI[item.cat]}</div>
                        <div>
                            <div class="record-category">${translations[currentLang][item.cat] || item.cat}${recurringBadge}</div>
                            <div class="record-desc">${item.desc}</div>
                        </div>
                    </div>
                    <div class="record-amount ${item.amount > 0 ? 'income' : 'expense'}">
                        ${item.amount > 0 ? '+' : ''}${item.amount.toFixed(2)}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // ============================================
        // Refresh
        // ============================================
        function refresh() {
            renderList();
            renderFilterChips();
            updateStats();
            refreshCharts();
        }

        function updateStats() {
            const rangeFiltered = getRangeFiltered();
            let totalIncome = 0, totalExpense = 0;
            let monthExpense = 0;

            const now = new Date();
            const thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

            records.forEach(item => {
                if (item.amount > 0) totalIncome += item.amount;
                else totalExpense += Math.abs(item.amount);

                const itemMonth = item.date.substring(0, 7);
                if (itemMonth === thisMonth && item.amount < 0) monthExpense += Math.abs(item.amount);
            });

            const balance = totalIncome - totalExpense;
            const balanceEl = document.getElementById('balance-amount');
            balanceEl.textContent = `¥ ${balance.toFixed(2)}`;
            balanceEl.className = `balance-amount ${balance >= 0 ? 'income' : 'expense'}`;

            // Budget
            if (budget.amount > 0) {
                const pct = Math.min(100, (monthExpense / budget.amount) * 100);
                const bar = document.getElementById('budget-bar');
                bar.style.width = pct + '%';
                bar.style.background = pct > 100 ? 'var(--expense)' : pct > 80 ? 'var(--warn)' : 'var(--income)';

                const barBg = document.getElementById('budget-bar-bg');
                if (pct > 100) {
                    barBg.classList.add('budget-warn');
                    showToast(translations[currentLang].over_budget, 3000);
                } else {
                    barBg.classList.remove('budget-warn');
                }

                const statusEl = document.getElementById('budget-status');
                statusEl.textContent = `¥${monthExpense.toFixed(2)} / ¥${budget.amount.toFixed(2)}`;
                statusEl.style.color = pct > 100 ? 'var(--expense)' : pct > 80 ? 'var(--warn)' : 'var(--income)';
            } else {
                document.getElementById('budget-bar').style.width = '0%';
                document.getElementById('budget-status').textContent = '';
            }

            // Goal
            if (goal.amount > 0) {
                document.getElementById('goal-name').textContent = `🎯 ${goal.name}`;
                const percent = Math.min(100, Math.max(0, (balance / goal.amount) * 100));
                document.getElementById('goal-progress').style.width = percent + '%';
                document.getElementById('goal-percent').textContent = percent.toFixed(1) + '%';

                if (balance >= goal.amount && !goal.achieved) {
                    goal.achieved = true;
                    localStorage.setItem('cyberledger_goal', JSON.stringify(goal));
                    document.getElementById('celebration-text').textContent =
                        `${translations[currentLang].goal_achieved}\n\nBalance: ¥${balance.toFixed(2)}`;
                    document.getElementById('celebration').classList.add('show');
                }
            } else {
                document.getElementById('goal-name').textContent = translations[currentLang].savings_goal;
                document.getElementById('goal-progress').style.width = '0%';
                document.getElementById('goal-percent').textContent = '0.0%';
            }

            // Comparison
            const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
            const lastMonthStr = lastMonth.getFullYear() + '-' + String(lastMonth.getMonth() + 1).padStart(2, '0');

            let lastIncome = 0, lastExpense = 0;
            records.forEach(i => {
                const m = i.date.substring(0, 7);
                if (m === lastMonthStr) {
                    if (i.amount > 0) lastIncome += i.amount;
                    else lastExpense += Math.abs(i.amount);
                }
            });

            document.getElementById('last-income').textContent = lastIncome > 0 ? `¥${lastIncome.toFixed(0)}` : '-';
            document.getElementById('last-expense').textContent = lastExpense > 0 ? `¥${lastExpense.toFixed(0)}` : '-';

            const changeEl = document.getElementById('expense-change');
            if (lastExpense > 0) {
                const pct = ((monthExpense - lastExpense) / lastExpense * 100).toFixed(0);
                const sign = pct >= 0 ? '+' : '';
                changeEl.innerHTML = `<span class="${pct >= 0 ? 'trend-up' : 'trend-down'}">${sign}${pct}%</span>`;
            } else {
                changeEl.textContent = '-';
            }
        }

        function refreshCharts() {
            const rangeFiltered = getRangeFiltered();

            // Calculate data
            let inc = 0, exp = 0;
            const lineData = [], labels = [];

            rangeFiltered
                .sort((a, b) => new Date(a.date) - new Date(b.date))
                .forEach(i => {
                    if (i.amount > 0) inc += i.amount;
                    else exp += Math.abs(i.amount);
                    lineData.push(inc - exp);
                    labels.push(new Date(i.date).toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', { month: 'short', day: 'numeric' }));
                });

            // Line Chart
            if (lineChart) lineChart.destroy();
            const ctxL = document.getElementById('line-chart').getContext('2d');
            const grad = ctxL.createLinearGradient(0, 0, 0, 60);
            grad.addColorStop(0, 'rgba(0, 122, 255, 0.2)');
            grad.addColorStop(1, 'rgba(0, 122, 255, 0)');

            lineChart = new Chart(ctxL, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data: lineData,
                        borderColor: '#007aff',
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: grad
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });

            // Pie Chart
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(document.getElementById('pie-chart'), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [inc || 1, exp || 0.01],
                        backgroundColor: ['#4cd964', '#ff3b30'],
                        borderWidth: 0
                    }]
                },
                options: {
                    cutout: '85%',
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            // Category Bar Chart
            if (catBarChart) catBarChart.destroy();
            const catData = {};
            rangeFiltered.filter(i => i.amount < 0).forEach(i => {
                catData[i.cat] = (catData[i.cat] || 0) + Math.abs(i.amount);
            });

            const sortedCats = Object.entries(catData).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const t = translations[currentLang];

            catBarChart = new Chart(document.getElementById('cat-bar-chart'), {
                type: 'bar',
                data: {
                    labels: sortedCats.map(([c]) => `${CAT_EMOJI[c]} ${t[c] || c}`),
                    datasets: [{
                        data: sortedCats.map(([, v]) => v),
                        backgroundColor: sortedCats.map(([c]) => CAT_COLORS[c] || '#888'),
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false, grid: { display: false } },
                        y: {
                            display: true,
                            grid: { display: false },
                            ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 11 } },
                            border: { display: false }
                        }
                    }
                }
            });
        }

        // ============================================
        // Keypad
        // ============================================
        function renderKeypad() {
            const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '.', '0', '←'];
            const kb = document.getElementById('keypad');
            kb.innerHTML = "";

            keys.forEach(k => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.textContent = k;
                btn.onclick = () => {
                    if (k === '←') inputStr = inputStr.slice(0, -1);
                    else {
                        if (k === '.' && inputStr.includes('.')) return;
                        if (inputStr.length < 10) inputStr += k;
                    }
                    document.getElementById('display-amount').textContent = `¥ ${inputStr || '0.00'}`;
                };
                kb.appendChild(btn);
            });
        }

        // ============================================
        // Import/Export
        // ============================================
        function exportExcel() {
            const t = translations[currentLang];
            const ws = XLSX.utils.json_to_sheet(records.map(i => ({
                Date: new Date(i.date).toLocaleString(),
                Category: t[i.cat] || i.cat,
                Note: i.desc,
                Amount: i.amount,
                Recurring: i.recurring ? 'Yes' : 'No'
            })));

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Ledger");
            const date = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `Ledger_${date}.xlsx`);
            showToast("📊 Excel exported");
        }

        function exportBackup() {
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = new Date().toISOString().split('T')[0];
            a.download = `Ledger_Backup_${date}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast(translations[currentLang].backup_downloaded);
        }

        async function importBackup(event) {
            const t = translations[currentLang];
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('Invalid format');

                    if (!confirm(`Found ${imported.length} records. Merge import?`)) return;

                    const existingIds = new Set(records.map(i => i.id));
                    const newItems = imported.filter(i => !existingIds.has(i.id));
                    records = [...records, ...newItems].sort((a, b) => new Date(b.date) - new Date(a.date));

                    await syncData();
                    refresh();
                    showToast(`${t.import_success} ${newItems.length} ${t.new_records}`);
                } catch (err) {
                    showToast(t.import_failed);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================
        // Modal
        // ============================================
        function closeModal() {
            document.getElementById('confirm-modal').classList.remove('show');
            pendingAction = null;
        }

        async function confirmAction() {
            if (pendingAction) {
                if (pendingAction.type === 'delete') {
                    await deleteRecord(pendingAction.id);
                } else if (pendingAction.type === 'clear') {
                    records = [];
                    await syncData();
                    refresh();
                    showToast(translations[currentLang].data_cleared);
                }
            }
            closeModal();
        }

        // ============================================
        // Toast
        // ============================================
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ============================================
        // Search
        // ============================================
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderList();
        });

        // ============================================
        // Init
        // ============================================
        init();
    </script>
</body>
</html>
